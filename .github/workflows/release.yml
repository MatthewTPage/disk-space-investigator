name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: "Release ${{ github.ref_name }} — changelog pending."
          draft: false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-glob: "build/compose/binaries/main-release/msi/*.msi"
          - os: macos-latest
            task: packageDmg
            artifact-glob: "build/compose/binaries/main-release/dmg/*.dmg"
          - os: ubuntu-latest
            task: packageDeb
            artifact-glob: "build/compose/binaries/main-release/deb/*.deb"
          - os: ubuntu-latest
            task: packageRpm
            artifact-glob: "build/compose/binaries/main-release/rpm/*.rpm"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        run: ./gradlew ${{ matrix.task }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact-glob }}
