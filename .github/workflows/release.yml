name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check if release exists
        id: check
        run: |
          if gh release view "${{ inputs.tag || github.ref_name }}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: "Release ${{ inputs.tag || github.ref_name }} — changelog pending."
          draft: false

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-glob: "build/compose/binaries/main-release/msi/*.msi"
          - os: macos-latest
            task: packageDmg
            artifact-glob: "build/compose/binaries/main-release/dmg/*.dmg"
          - os: ubuntu-latest
            task: packageDeb
            artifact-glob: "build/compose/binaries/main-release/deb/*.deb"
          - os: ubuntu-latest
            task: packageRpm
            artifact-glob: "build/compose/binaries/main-release/rpm/*.rpm"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build installer
        run: ./gradlew ${{ matrix.task }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: ${{ matrix.artifact-glob }}
